services:
  - type: web
    name: smart-parking-backend
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python manage.py migrate --run-syncdb --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn project.wsgi:application
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: smart-parking-backend.onrender.com
      - key: DJANGO_TIME_ZONE
        value: Africa/Johannesburg
      - key: DATABASE_URL
        fromDatabase:
          name: smart-parking-db
          property: connectionString
      - key: DATABASE_SSL_REQUIRE
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-netlify-dashboard.netlify.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-netlify-dashboard.netlify.app
      - key: MEDIA_URL
        value: /media/
      - key: STATIC_URL
        value: /static/

databases:
  - name: smart-parking-db
    plan: starter
    databaseName: smart_parking
    user: smart_parking

